<style>
:root {
  --ink: #1a1a2e;
  --red: #c0392b;
  --gold: #d4a017;
  --cream: #fdf6e3;
  --paper: #f5ead6;
  --muted: #7a6652;
  --border: #d9c9a8;
  --green: #27ae60;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

/* NAV */
nav {
  background: var(--ink);
  padding: 13px 24px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
nav a.logo { color: var(--gold); text-decoration: none; font-weight: 700; font-size: 17px; white-space: nowrap; }
nav .sep { color: rgba(255,255,255,0.3); }
nav .bc { color: rgba(255,255,255,0.55); font-size: 13px; }
nav .home-btn {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white; text-decoration: none;
  font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px;
  transition: background 0.2s; white-space: nowrap;
}
nav .home-btn:hover { background: rgba(255,255,255,0.2); }

/* HERO — nội dung SEO viết thẳng, Google đọc được */
.hero {
  background: var(--ink);
  padding: 40px 20px 48px;
  text-align: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, #2d1b4e 0%, var(--ink) 70%);
}
.hero-inner { position: relative; z-index: 1; }

.char-big {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(90px, 20vw, 140px);
  color: white; line-height: 1;
  text-shadow: 0 4px 30px rgba(212,160,23,0.35);
}
h1.char-title {
  font-size: 20px; color: var(--gold);
  margin-top: 12px; font-weight: 700;
  letter-spacing: 0.5px;
}
.char-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 6px; }
.hero-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6);
  font-size: 12px; padding: 4px 14px; border-radius: 20px;
}

/* MAIN LAYOUT */
.layout {
  max-width: 960px; margin: 0 auto;
  padding: 24px 16px 60px;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
  align-items: start;
}
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .col-right { order: -1; }
}

/* IFRAME WIDGET */
.iframe-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  position: sticky; top: 60px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.07);
}
.iframe-card-header {
  padding: 12px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.iframe-card-header span { font-size: 13px; font-weight: 700; color: var(--ink); }
.iframe-card-header a {
  margin-left: auto;
  font-size: 11px; color: var(--red);
  text-decoration: none; font-weight: 600;
}
.iframe-card-header a:hover { text-decoration: underline; }
#hanzi-iframe {
  width: 100%; border: none;
  height: 480px; display: block;
}

/* SECTION */
.section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.sec-head {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
}
.sec-head h2 { font-size: 14px; font-weight: 700; color: var(--ink); }
.sec-icon {
  width: 26px; height: 26px;
  background: var(--ink); border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.badge {
  margin-left: auto;
  background: var(--ink); color: var(--gold);
  font-size: 10px; font-weight: 700;
  padding: 2px 9px; border-radius: 20px;
}

/* INTRO TEXT — quan trọng cho SEO */
.intro-text {
  padding: 16px 18px;
  font-size: 14px; line-height: 1.8; color: #444;
}
.intro-text strong { color: var(--ink); }

/* WORDS */
.words-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1px; background: var(--border);
}
.word-card { background: white; padding: 12px 14px; transition: background 0.15s; }
.word-card:hover { background: #fdf8f0; }
.word-zh { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.word-py { font-size: 11px; color: var(--red); font-weight: 600; margin-bottom: 2px; }
.word-vn { font-size: 12px; color: #444; }
.word-cat { margin-top: 4px; display: inline-block; font-size: 10px; color: var(--muted); background: var(--paper); padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); }

/* SENTENCES */
.sent-item {
  padding: 13px 18px; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 22px 1fr; gap: 0 12px;
}
.sent-item:last-child { border-bottom: none; }
.sent-num {
  font-size: 10px; font-weight: 700; color: var(--gold);
  background: var(--ink); width: 22px; height: 22px;
  border-radius: 5px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.sent-zh { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink); line-height: 1.6; }
.sent-py { font-size: 11px; color: var(--red); margin: 2px 0; }
.sent-vn { font-size: 12px; color: var(--muted); font-style: italic; }

/* RELATED */
.related-wrap { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 8px; }
.rel-char {
  font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700;
  width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
  background: var(--paper); border: 1.5px solid var(--border); border-radius: 9px;
  color: var(--ink); text-decoration: none; transition: all 0.15s;
}
.rel-char:hover { background: var(--ink); color: var(--gold); border-color: var(--ink); transform: translateY(-2px); }

/* BACK */
.back-wrap { text-align: center; padding: 8px 0 4px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: var(--gold);
  text-decoration: none; font-weight: 700; font-size: 14px;
  padding: 12px 28px; border-radius: 10px;
  transition: opacity 0.15s;
}
.back-btn:hover { opacity: 0.85; }

.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>

<nav>
  <a class="logo" href="https://www.luyentiengtrung.com/">🐼 Luyện Tiếng Trung</a>
  <span class="sep">›</span>
  <span class="bc" id="nav-bc">Tra từ › 人</span>
  <a class="home-btn" href="https://www.luyentiengtrung.com/">← Trang chủ</a>
</nav>

<!-- HERO: nội dung viết thẳng cho Google crawl -->
<div class="hero">
  <div class="hero-inner">
    <div class="char-big" id="hero-char">人</div>
    <h1 class="char-title" id="hero-title">Chữ 人 (rén) — Nhân, người</h1>
    <div class="char-sub" id="hero-sub">Bộ thủ 人 (Nhân) · 2 nét</div>
    <div class="hero-pills">
      <span class="pill" id="pill-words">📚 25 từ vựng</span>
      <span class="pill" id="pill-sents">💬 15 ví dụ câu</span>
      <span class="pill">🆓 Miễn phí</span>
    </div>
  </div>
</div>

<!-- NỘI DUNG CHÍNH -->
<div class="layout" id="main-layout">
  <div class="col-left" id="col-left">
    <div class="loading">⏳ Đang tải nội dung...</div>
  </div>
  <div class="col-right">
    <div class="iframe-card">
      <div class="iframe-card-header">
        <span>🖋 Xem chi tiết đầy đủ</span>
        <a id="iframe-fulllink" href="https://www.luyentiengtrung.com/hanzi/人.html" target="_blank">Mở trang mới ↗</a>
      </div>
      <iframe
        id="hanzi-iframe"
        src="https://www.luyentiengtrung.com/hanzi/人.html"
        title="Chi tiết chữ 人 trong tiếng Trung"
        frameborder="0"
        loading="lazy"
        allow="autoplay"
      ></iframe>
    </div>
  </div>
</div>

<script>
const DATA_URL = "https://www.luyentiengtrung.com/data/code.json";

// Tự động cập nhật iframe và toàn bộ trang theo CHAR
function applyChar(char) {
  const hanziUrl = `https://www.luyentiengtrung.com/hanzi/${encodeURIComponent(char)}.html`;
  document.getElementById('hanzi-iframe').src = hanziUrl;
  document.getElementById('iframe-fulllink').href = hanziUrl;
  document.getElementById('iframe-fulllink').title = `Mở trang chữ ${char} trong tab mới`;
}

// Cập nhật meta SEO động
function updateMeta(char, hanviet, pinyin, wordCount, sentCount) {
  const title = `Chữ ${char}${pinyin?' ('+pinyin+')':''} - ${hanviet} | Luyện Tiếng Trung`;
  const desc = `Chữ Hán ${char}${pinyin?' ('+pinyin+')':''} - ${hanviet}. Xem cách viết, phát âm, ${wordCount} từ vựng và ${sentCount} ví dụ câu tiếng Trung có chứa chữ ${char}. Học tiếng Trung miễn phí.`;
  const url = `https://www.luyentiengtrung.com/word/${char}.html`;

  document.getElementById('pg-title').textContent = title;
  document.getElementById('pg-desc').setAttribute('content', desc);
  document.getElementById('pg-og-title').setAttribute('content', title);
  document.getElementById('pg-og-desc').setAttribute('content', desc);
  document.getElementById('pg-og-url').setAttribute('content', url);
  document.getElementById('pg-canonical').setAttribute('href', url);
  document.title = title;

  document.getElementById('pg-schema').textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": title,
    "description": desc,
    "url": url,
    "publisher": {
      "@type": "Organization",
      "name": "Luyện Tiếng Trung",
      "url": "https://www.luyentiengtrung.com"
    }
  });
}

function getToneNum(py) {
  if (!py) return 0;
  const map = {'ā':1,'á':2,'ǎ':3,'à':4,'ē':1,'é':2,'ě':3,'è':4,'ī':1,'í':2,'ǐ':3,'ì':4,'ō':1,'ó':2,'ǒ':3,'ò':4,'ū':1,'ú':2,'ǔ':3,'ù':4};
  for (const [k,v] of Object.entries(map)) if (py.includes(k)) return v;
  return 5;
}

async function loadPage() {
  const char = typeof CHAR !== 'undefined' ? CHAR : '人';
  const col = document.getElementById('col-left');

  // Cập nhật iframe ngay
  applyChar(char);

  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error('Không tải được dữ liệu');
    const data = await res.json();
    const info = data[char];

    if (!info) {
      col.innerHTML = `<div class="loading">Không tìm thấy dữ liệu cho chữ <strong>${char}</strong></div>`;
      return;
    }

    const hanviet = info.hanviet || '';
    const words = info.words || [];
    const sentences = info.sentences || [];

    // Lấy pinyin từ từ đơn hoặc từ đầu tiên
    let pinyin = info.pinyin || '';
    if (!pinyin) {
      const exact = words.find(w => w.chinese === char);
      pinyin = exact?.pinyin || '';
    }
    const toneNum = getToneNum(pinyin);
    const toneLabel = toneNum === 5 ? 'nhẹ' : (toneNum || '');

    // Cập nhật hero + meta
    document.getElementById('hero-char').textContent = char;
    document.getElementById('hero-title').textContent = `Chữ ${char}${pinyin?' ('+pinyin+')':''} — ${hanviet}`;
    document.getElementById('hero-sub').textContent = `Hán Việt: ${hanviet}${toneLabel?' · Thanh '+toneLabel:''}`;
    document.getElementById('pill-words').textContent = `📚 ${words.length} từ vựng`;
    document.getElementById('pill-sents').textContent = `💬 ${sentences.length} ví dụ câu`;
    document.getElementById('nav-bc').textContent = `Tra từ › ${char}`;
    document.getElementById('iframe-fulllink').title = `Mở trang chữ ${char} trong tab mới`;
    updateMeta(char, hanviet, pinyin, words.length, sentences.length);

    // Chữ liên quan
    const related = new Set();
    for (const w of words)
      for (const c of (w.chinese || ''))
        if (c !== char && c >= '\u4e00' && c <= '\u9fff' && data[c]) related.add(c);

    let html = '';

    // --- GIỚI THIỆU (quan trọng cho SEO) ---
    html += `
    <div class="section">
      <div class="sec-head">
        <div class="sec-icon">📖</div>
        <h2>Giới thiệu chữ ${char}</h2>
      </div>
      <div class="intro-text">
        <p><strong>Chữ ${char}</strong>${pinyin?' (phiên âm: <strong>'+pinyin+'</strong>)':''} là một chữ Hán cơ bản trong tiếng Trung Phổ thông (Mandarin).
        Nghĩa Hán Việt của chữ <strong>${char}</strong> là <strong>${hanviet}</strong>.
        ${toneLabel?`Chữ này được đọc với <strong>thanh ${toneLabel}</strong> trong tiếng Trung.`:''}
        </p>
        <br>
        <p>Trong kho từ vựng tiếng Trung, chữ <strong>${char}</strong> xuất hiện trong <strong>${words.length} từ và cụm từ</strong> thông dụng.
        Trang này tổng hợp đầy đủ các từ vựng, ví dụ câu và cách sử dụng chữ <strong>${char}</strong> trong giao tiếp hàng ngày,
        giúp người học tiếng Trung nắm vững chữ này một cách toàn diện.</p>
      </div>
    </div>`;

    // --- TỪ VỰNG ---
    if (words.length > 0) {
      const wordsHTML = words.map(w => `
        <div class="word-card">
          <div class="word-zh">${w.chinese || ''}</div>
          <div class="word-py">${w.pinyin || ''}</div>
          <div class="word-vn">${w.meaning || ''}</div>
          ${(w.category||[]).length ? `<div class="word-cat">${w.category.join(', ')}</div>` : ''}
        </div>`).join('');

      html += `
      <div class="section">
        <div class="sec-head">
          <div class="sec-icon">📚</div>
          <h2>Từ vựng có chứa chữ ${char}</h2>
          <span class="badge">${words.length} từ</span>
        </div>
        <div class="words-grid">${wordsHTML}</div>
      </div>`;
    }

    // --- VÍ DỤ CÂU ---
    if (sentences.length > 0) {
      const sentHTML = sentences.map((s, i) => `
        <div class="sent-item">
          <div class="sent-num">${i + 1}</div>
          <div>
            <div class="sent-zh">${s.chinese || ''}</div>
            <div class="sent-py">${s.pinyin || ''}</div>
            <div class="sent-vn">${s.vietnamese || ''}</div>
          </div>
        </div>`).join('');

      html += `
      <div class="section">
        <div class="sec-head">
          <div class="sec-icon">💬</div>
          <h2>Ví dụ câu có chữ ${char}</h2>
          <span class="badge">${sentences.length} câu</span>
        </div>
        ${sentHTML}
      </div>`;
    }

    // --- CHỮ LIÊN QUAN ---
    if (related.size > 0) {
      const relHTML = [...related].slice(0, 20).map(rc =>
        `<a class="rel-char" href="${rc}.html" title="Chữ ${rc}">${rc}</a>`).join('');
      html += `
      <div class="section">
        <div class="sec-head">
          <div class="sec-icon">🔗</div>
          <h2>Chữ Hán liên quan</h2>
        </div>
        <div class="related-wrap">${relHTML}</div>
      </div>`;
    }

    // --- MẸO HỌC ---
    html += `
    <div class="section">
      <div class="sec-head">
        <div class="sec-icon">💡</div>
        <h2>Mẹo học chữ ${char}</h2>
      </div>
      <div class="intro-text">
        <p>• Xem <strong>animation thứ tự nét</strong> ở khung bên cạnh để học cách viết đúng chữ ${char}.</p>
        <p>• Luyện nghe phát âm <strong>${pinyin || char}</strong> nhiều lần cho đến khi quen tai.</p>
        <p>• Học các từ ghép phổ biến trước: đây là cách hiệu quả nhất để nhớ lâu.</p>
        <p>• Thực hành đặt câu với các ví dụ ở trên để nhớ ngữ cảnh sử dụng.</p>
      </div>
    </div>`;

    html += `<div class="back-wrap"><a class="back-btn" href="https://www.luyentiengtrung.com/">← Về trang chủ</a></div>`;

    col.innerHTML = html;

  } catch (err) {
    col.innerHTML = `<div class="loading">⚠️ Lỗi tải dữ liệu: ${err.message}</div>`;
  }
}

loadPage();
</script>
</body>
</html>
